name: Build SuperSU

on:
    push:
        branches: [main, master, app]
    pull_request:
        branches: [main, master, app]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        strategy:
            matrix:
                build_type: [release]

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y python3 gh

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Build App
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      python build.py -vr app
                  else
                      python build.py -v app
                  fi

            - name: Stop Gradle
              run: ./app/gradlew --stop

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: magisk_${{ matrix.build_type }}
                  path: out/app-release.apk

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      tag="SuperSU"
                      file="out/app-release.apk"
                  else
                      tag="canary_build"
                      file="out/app-debug.apk"
                  fi
                  commit=$(git rev-parse --short HEAD)
                  branch=${GITHUB_REF#refs/heads/}
                  build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
                  body=$(printf "SuperSU automated build\n\nBranch: %s\nCommit: %s\nBuild type: %s\nBuild time: %s\nActor: %s\nRepository: %s\n" \
                      "$branch" \
                      "$commit" \
                      "${{ matrix.build_type }}" \
                      "$build_time" \
                      "$GITHUB_ACTOR" \
                      "$GITHUB_REPOSITORY")
                  gh release delete "$tag" -y || true
                  git tag -d "$tag" || true
                  git push origin :refs/tags/$tag || true
                  git tag "$tag"
                  git push origin "$tag"
                  gh release create "$tag" "$file" \
                      --title "$tag" \
                      --notes "$body"
