name: Build Native Binaries

on:
    push:
        branches: [main, master, native, app]
    pull_request:
        branches: [main, master, native, app]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ccache python3 zip

            - name: Setup ccache
              run: |
                  mkdir -p ~/.ccache
                  echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
                  echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
                  echo "/usr/lib/ccache" >> $GITHUB_PATH
                  ccache --max-size=3G

            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c','**/*.cpp','**/*.h','**/*.rs') }}
                  restore-keys: |
                      ccache-${{ runner.os }}-

            - name: Setup Rust Toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android, armv7-linux-androideabi

            - name: Setup Android SDK Environment
              run: |
                  echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

            - name: Setup ONDK Toolchain
              run: |
                  python build.py ndk

            - name: Build Native
              run: |
                  python build.py native

            - name: Upload Native Output
              uses: actions/upload-artifact@v4
              with:
                  name: native-binary-jar
                  path: native/out/native.jar
                  