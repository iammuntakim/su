name: Build Native Libraries

on:
    push:
        branches: [main, master, native]
    pull_request:
        branches: [main, master, native]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        strategy:
            matrix:
                build_type: [release]

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ccache python3 zip tar xz-utils wget gh

            - name: Setup ccache
              run: |
                  mkdir -p ~/.ccache
                  echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
                  echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
                  echo "/usr/lib/ccache" >> $GITHUB_PATH
                  ccache --max-size=3G

            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c','**/*.cpp','**/*.h','**/*.rs') }}
                  restore-keys: |
                      ccache-${{ runner.os }}-

            - name: Setup Rust Toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android, armv7-linux-androideabi

            - name: Setup Android SDK Environment & ONDK
              run: |
                  echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
                  mkdir -p $ANDROID_SDK_ROOT/ndk
                  cd $ANDROID_SDK_ROOT/ndk
                  wget -q https://github.com/topjohnwu/ondk/releases/download/r29.5/ondk-r29.5-linux.tar.xz
                  tar -xf ondk-r29.5-linux.tar.xz
                  rm -rf magisk
                  mv ondk-r29.5 magisk
                  rm -f ondk-r29.5-linux.tar.xz

            - name: Build Native
              run: |
                  python build.py native

            - name: Upload Native Output
              uses: actions/upload-artifact@v4
              with:
                  name: native-binary-jar
                  path: native/out/native.jar

            - name: Task :publish:writeGithubRelease
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      tag="SuperSU"
                      file="native/out/native.jar"
                  else
                      tag="canary_build"
                      file="native/out/native.jar"
                  fi
                  commit=$(git rev-parse --short HEAD)
                  branch=${GITHUB_REF#refs/heads/}
                  build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
                  body=$(printf "SuperSU automated build\n\nBranch: %s\nCommit: %s\nBuild type: %s\nBuild time: %s\nActor: %s\nRepository: %s\n" \
                      "$branch" \
                      "$commit" \
                      "${{ matrix.build_type }}" \
                      "$build_time" \
                      "$GITHUB_ACTOR" \
                      "$GITHUB_REPOSITORY")
                  gh release delete "$tag" -y || true
                  git tag -d "$tag" || true
                  git push origin :refs/tags/$tag || true
                  git tag "$tag"
                  git push origin "$tag"
                  gh release create "$tag" "$file" \
                      --title "$tag" \
                      --notes "$body"
